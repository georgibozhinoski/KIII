name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:

  # Backend 
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./CourseSuggestionApp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/course-backend:latest

  #Frontend
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./course-suggestion-app-react
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/course-frontend:latest

  # Python Recommender 
  build-recommender:
    name: Build & Push Recommender
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push recommender image
        uses: docker/build-push-action@v5
        with:
          context: ./course-recommender-py
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/course-recommender:latest
