apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: course-suggestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: georgi02/course-frontend:latest
	  imagePullPolicy: Always
          ports:
            - containerPort: 80
